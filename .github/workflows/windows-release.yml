name: windows-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: '1'
      ELECTRON_MIRROR: 'https://npmmirror.com/mirrors/electron/'
      ELECTRON_BUILDER_BINARIES_MIRROR: 'https://npmmirror.com/mirrors/electron-builder-binaries/'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        shell: pwsh
        run: |
          npm.cmd ci

      - name: Download U2NET model
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:USERPROFILE '.u2net'
          New-Item -ItemType Directory -Force -Path $modelDir | Out-Null
          $modelPath = Join-Path $modelDir 'u2net.onnx'
          if (-not (Test-Path $modelPath)) {
            Invoke-WebRequest -Uri 'https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx' -OutFile $modelPath
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm.cmd run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release\*.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release\*.exe
          generate_release_notes: true