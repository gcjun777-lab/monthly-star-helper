name: windows-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download U2NET model
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:USERPROFILE '.u2net'
          New-Item -ItemType Directory -Force -Path $modelDir | Out-Null
          $modelPath = Join-Path $modelDir 'u2net.onnx'
          if (-not (Test-Path $modelPath)) {
            Invoke-WebRequest -Uri 'https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx' -OutFile $modelPath
          }

      - name: Build GUI EXE
        shell: pwsh
        run: |
          python build_windows_exe.py

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'
          if ($version.StartsWith('v')) { $version = $version.Substring(1) }
          $env:APP_VERSION = $version
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' 'installer\windows_installer.iss'

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-dist
          path: dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist_installer\*.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\月度之星海报生成器.exe
            dist_installer\*.exe
          generate_release_notes: true
